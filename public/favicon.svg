<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Graduation cap: top board (diamond) -->
  <polygon
    points="32,10 56,22 32,34 8,22"
    fill="white"
    filter="url(#shadow)"
  />

  <!-- Cap body (rounded trapezoid) -->
  <path
    d="M17,27 L17,42 Q17,53 32,53 Q47,53 47,42 L47,27"
    fill="rgba(255,255,255,0.92)"
    filter="url(#shadow)"
  />

  <!-- Tassel vertical line -->
  <line x1="56" y1="22" x2="56" y2="38"
    stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Tassel horizontal crossbar -->
  <line x1="52" y1="38" x2="60" y2="38"
    stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tassel hanging strings -->
  <line x1="52" y1="38" x2="50" y2="46"
    stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="38" x2="56" y2="47"
    stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="38" x2="62" y2="46"
    stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tassel end balls -->
  <circle cx="50" cy="47" r="2" fill="white" opacity="0.85"/>
  <circle cx="56" cy="48.5" r="2" fill="white" opacity="0.85"/>
  <circle cx="62" cy="47" r="2" fill="white" opacity="0.85"/>
</svg>
